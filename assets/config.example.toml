# Default output format (xml, markdown, json)
format = "xml"

# Automatically find and use the root of the git project
git_root = false

# Instruction sets to inject into context output
# You can now specify different sets and select them using: context --instructions <name>
[instructions]
default = ""
developer = "You are a senior developer. Please review the following code for optimizations and security vulnerabilities."
review = "Review the provided code for security vulnerabilities and suggest improvements."
test = "Write comprehensive unit tests for the provided files."
